<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Local document AI extraction flow</title>
  <desc id="desc">A portfolio visualization showing PDF upload, parsing, chunking, prompt assembly, local Ollama inference, and Streamlit review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101b"/>
      <stop offset="1" stop-color="#121827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58dce6"/>
      <stop offset="0.55" stop-color="#b9a7ff"/>
      <stop offset="1" stop-color="#f1bd5c"/>
    </linearGradient>
  </defs>
  <rect width="920" height="560" rx="34" fill="url(#bg)"/>
  <path d="M70 112h780M70 212h780M70 312h780M70 412h780" stroke="#20324b" stroke-width="1"/>
  <text x="58" y="70" fill="#f8fbff" font-family="Inter,Segoe UI,sans-serif" font-size="34" font-weight="800">Local document AI boundary</text>
  <text x="58" y="102" fill="#9fb4d1" font-family="Inter,Segoe UI,sans-serif" font-size="16">Parse, chunk, prompt, infer, and review inside a local workflow.</text>
  <path d="M158 280h600" stroke="url(#line)" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 18"/>
  <g font-family="Inter,Segoe UI,sans-serif">
    <g transform="translate(62 190)">
      <rect width="138" height="128" rx="18" fill="#0b1728" stroke="#58dce6" stroke-opacity=".38"/>
      <text x="24" y="40" fill="#58dce6" font-size="14" font-weight="800">01</text>
      <text x="24" y="70" fill="#f8fbff" font-size="19" font-weight="800">PDF upload</text>
      <text x="24" y="96" fill="#9fb4d1" font-size="13">local file</text>
    </g>
    <g transform="translate(212 190)">
      <rect width="138" height="128" rx="18" fill="#0b1728" stroke="#8de8b4" stroke-opacity=".38"/>
      <text x="24" y="40" fill="#8de8b4" font-size="14" font-weight="800">02</text>
      <text x="24" y="70" fill="#f8fbff" font-size="19" font-weight="800">Extract text</text>
      <text x="24" y="96" fill="#9fb4d1" font-size="13">PDFPlumber</text>
    </g>
    <g transform="translate(362 190)">
      <rect width="138" height="128" rx="18" fill="#0b1728" stroke="#b9a7ff" stroke-opacity=".42"/>
      <text x="24" y="40" fill="#b9a7ff" font-size="14" font-weight="800">03</text>
      <text x="24" y="70" fill="#f8fbff" font-size="19" font-weight="800">Chunk</text>
      <text x="24" y="96" fill="#9fb4d1" font-size="13">criteria context</text>
    </g>
    <g transform="translate(512 190)">
      <rect width="138" height="128" rx="18" fill="#0b1728" stroke="#f0a0bd" stroke-opacity=".42"/>
      <text x="24" y="40" fill="#f0a0bd" font-size="14" font-weight="800">04</text>
      <text x="24" y="70" fill="#f8fbff" font-size="19" font-weight="800">Prompt</text>
      <text x="24" y="96" fill="#9fb4d1" font-size="13">assembly</text>
    </g>
    <g transform="translate(662 190)">
      <rect width="138" height="128" rx="18" fill="#0b1728" stroke="#f1bd5c" stroke-opacity=".42"/>
      <text x="24" y="40" fill="#f1bd5c" font-size="14" font-weight="800">05</text>
      <text x="24" y="70" fill="#f8fbff" font-size="19" font-weight="800">Ollama</text>
      <text x="24" y="96" fill="#9fb4d1" font-size="13">local model</text>
    </g>
  </g>
  <rect x="238" y="380" width="444" height="82" rx="20" fill="#0b1728" stroke="#58dce6" stroke-opacity=".22"/>
  <text x="270" y="414" fill="#f8fbff" font-family="Inter,Segoe UI,sans-serif" font-size="21" font-weight="800">Streamlit review surface</text>
  <text x="270" y="442" fill="#9fb4d1" font-family="Inter,Segoe UI,sans-serif" font-size="15">Human-readable extraction output before downstream use.</text>
</svg>
