name: Live Hostinger Staging QA

on:
  workflow_dispatch:
    inputs:
      staging_url:
        description: Temporary HTTPS Hostinger staging origin
        required: true
        type: string
      target_ref:
        description: Branch or full commit SHA deployed to staging
        required: true
        default: codex/portfolio-v2.3-creative-expansion
        type: string
      expected_sha:
        description: Optional full deployed SHA to verify against the checkout
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: portfolio-live-staging-${{ inputs.staging_url }}
  cancel-in-progress: false

jobs:
  live-staging-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PLAYWRIGHT_BASE_URL: ${{ inputs.staging_url }}
      PLAYWRIGHT_EXPECTED_CANONICAL_URL: ${{ inputs.staging_url }}
      PLAYWRIGHT_EXPECTED_ROBOTS: noindex,nofollow
      PLAYWRIGHT_EXPECTED_SHA: ${{ inputs.expected_sha }}
      # WebKit's Linux trust store rejects the otherwise valid Hostinger
      # temporary-domain chain. The strict OpenSSL + Chromium preflight below
      # remains the authoritative TLS gate; this flag only lets WebKit reach
      # the pages.
      PLAYWRIGHT_WEBKIT_IGNORE_HTTPS_ERRORS: 'true'
    steps:
      - name: Checkout deployed ref
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.target_ref }}

      - name: Verify optional expected SHA
        if: ${{ inputs.expected_sha != '' }}
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ inputs.expected_sha }}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Validate staging TLS and deployed identity
        shell: bash
        run: |
          staging_host="$(node -p 'new URL(process.env.PLAYWRIGHT_BASE_URL).hostname')"
          timeout 30 openssl s_client \
            -connect "${staging_host}:443" \
            -servername "$staging_host" \
            -verify_hostname "$staging_host" \
            -verify_return_error \
            -brief \
            </dev/null >"$RUNNER_TEMP/tls-preflight.log" 2>&1
          echo "OpenSSL CA and hostname verification passed for $staging_host"
          node <<'NODE'
          const { chromium } = require('@playwright/test');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            try {
              const page = await browser.newPage();
              const response = await page.goto(`${process.env.PLAYWRIGHT_BASE_URL}/build.json`, {
                waitUntil: 'domcontentloaded',
              });
              if (!response?.ok()) {
                throw new Error(`Identity request failed with HTTP ${response?.status() ?? 'unknown'}`);
              }
              const build = JSON.parse(await page.locator('body').innerText());
              const expected = process.env.PLAYWRIGHT_EXPECTED_SHA;
              if (expected && build.commit !== expected) {
                throw new Error(`Deployed SHA mismatch: expected ${expected}, received ${build.commit}`);
              }
              if (build.target !== 'hostinger-staging') {
                throw new Error(`Unexpected deployment target: ${build.target}`);
              }
              console.log(`Strict Chromium identity preflight passed for ${build.target} at ${build.commit}`);
            } finally {
              await browser.close();
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Live accessibility matrix
        run: npm run test:a11y:all

      - name: Live route, metadata, console, and network matrix
        run: npm run test:e2e:all

      - name: Live browser-mode matrix
        run: npm run test:live-modes

      - name: Final live visual pass
        run: npm run screenshots:pass5

      - name: Upload live-origin QA artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: portfolio-live-staging-qa-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 30
