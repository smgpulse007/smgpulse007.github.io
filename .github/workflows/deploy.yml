name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PUBLIC_DEPLOY_TARGET: github-pages-mirror
      PUBLIC_SITE_URL: https://smgpulse007.github.io
      PUBLIC_CANONICAL_URL: https://shaileshdudala.com
      PUBLIC_ROBOTS: noindex,follow
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Type, unit, and target checks
        run: |
          npm run check
          npm test
          npm run test:targets

      - name: Browser validation against local target
        env:
          PUBLIC_DEPLOY_TARGET: local
          PUBLIC_SITE_URL: http://localhost:4321
          PUBLIC_CANONICAL_URL: http://localhost:4321
          PUBLIC_ROBOTS: noindex,nofollow
        run: |
          npm run test:a11y
          npm run test:e2e

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build no-index mirror
        run: npm run build

      - name: Validate mirror content and links
        run: |
          npm run test:content
          npm run test:links

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
