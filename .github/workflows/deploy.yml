name: Deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full 40-character production-verified release SHA
        required: true
        type: string
      production_verified:
        description: Confirm Hostinger production passed cutover verification
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PUBLIC_DEPLOY_TARGET: github-pages-mirror
      PUBLIC_SITE_URL: https://smgpulse007.github.io
      PUBLIC_CANONICAL_URL: https://shaileshdudala.com
      PUBLIC_ROBOTS: noindex,follow
      COMMIT_SHA: ${{ inputs.release_sha }}
    steps:
      - name: Enforce post-production release gate
        shell: bash
        run: |
          [[ "${{ inputs.production_verified }}" == "true" ]]
          [[ "${{ inputs.release_sha }}" =~ ^[0-9a-f]{40}$ ]]

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha }}

      - name: Verify immutable release checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ inputs.release_sha }}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Type, unit, and target checks
        run: |
          npm run check
          npm test
          npm run test:targets

      - name: Browser validation against local target
        env:
          PUBLIC_DEPLOY_TARGET: local
          PUBLIC_SITE_URL: http://localhost:4321
          PUBLIC_CANONICAL_URL: http://localhost:4321
          PUBLIC_ROBOTS: noindex,nofollow
        run: |
          npm run test:a11y
          npm run test:e2e

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build no-index mirror
        run: npm run build

      - name: Verify mirror build identity and SEO contract
        shell: bash
        run: |
          node -e "const m=require('./dist/build.json'); if(m.commit !== process.env.COMMIT_SHA || m.target !== 'github-pages-mirror') process.exit(1)"
          test ! -e dist/sitemap-index.xml
          grep -q 'noindex,follow' dist/index.html
          grep -q 'https://shaileshdudala.com/' dist/index.html

      - name: Validate mirror content and links
        run: |
          npm run test:content
          npm run test:links

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
