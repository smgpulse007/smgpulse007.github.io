<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" role="img" aria-labelledby="title desc">
  <title id="title">Applied AI system map</title>
  <desc id="desc">System map connecting healthcare interoperability, agentic AI, document intelligence, ML services, quant forecasting, and LLMOps/MLOps validation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#05070c"/><stop offset=".58" stop-color="#0f172a"/><stop offset="1" stop-color="#172032"/></linearGradient>
    <linearGradient id="flow" x1="0" x2="1"><stop offset="0" stop-color="#58dce6"/><stop offset=".52" stop-color="#86efac"/><stop offset="1" stop-color="#f7c86a"/></linearGradient>
  </defs>
  <rect width="880" height="560" rx="24" fill="url(#bg)"/>
  <g stroke="#ffffff" stroke-opacity=".055" stroke-width="1"><path d="M80 80h720M80 180h720M80 280h720M80 380h720M80 480h720"/><path d="M120 50v460M280 50v460M440 50v460M600 50v460M760 50v460"/></g>
  <g fill="#ffffff" fill-opacity=".06" stroke-width="2">
    <rect x="70" y="82" width="190" height="86" rx="12" stroke="#58dce6"/><rect x="345" y="82" width="190" height="86" rx="12" stroke="#86efac"/><rect x="620" y="82" width="190" height="86" rx="12" stroke="#f7c86a"/>
    <rect x="70" y="310" width="190" height="86" rx="12" stroke="#c4b5fd"/><rect x="345" y="310" width="190" height="86" rx="12" stroke="#58dce6"/><rect x="620" y="310" width="190" height="86" rx="12" stroke="#86efac"/>
  </g>
  <g stroke="url(#flow)" stroke-width="3" fill="none" stroke-linecap="round"><path d="M260 125h85M535 125h85M165 168v142M440 168v142M715 168v142"/><path d="M260 353h85M535 353h85"/><path d="M165 396c120 80 430 80 550 0" stroke-opacity=".48"/></g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="102" y="118" fill="#ffffff" font-size="18" font-weight="800">FHIR / HL7</text><text x="102" y="144" fill="#a7b5c9" font-size="14">standards input</text>
    <text x="377" y="118" fill="#ffffff" font-size="18" font-weight="800">Agentic AI</text><text x="377" y="144" fill="#a7b5c9" font-size="14">workflow state</text>
    <text x="650" y="118" fill="#ffffff" font-size="18" font-weight="800">Document AI</text><text x="650" y="144" fill="#a7b5c9" font-size="14">OCR and RAG</text>
    <text x="104" y="346" fill="#ffffff" font-size="18" font-weight="800">ML Services</text><text x="104" y="372" fill="#a7b5c9" font-size="14">risk scoring</text>
    <text x="374" y="346" fill="#ffffff" font-size="18" font-weight="800">Quant Forecasts</text><text x="374" y="372" fill="#a7b5c9" font-size="14">calibration</text>
    <text x="652" y="346" fill="#ffffff" font-size="18" font-weight="800">LLMOps / MLOps</text><text x="652" y="372" fill="#a7b5c9" font-size="14">validation loop</text>
  </g>
