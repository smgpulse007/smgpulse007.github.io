<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">NFL forecasting model comparison</title>
  <desc id="desc">A portfolio visualization of 2024 model accuracy and Brier score for Elo, XGBoost, Logistic Regression, and Ensemble models.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58dce6"/>
      <stop offset="1" stop-color="#8de8b4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="920" height="560" rx="34" fill="url(#bg)"/>
  <path d="M58 112h804M58 202h804M58 292h804M58 382h804M58 472h804" stroke="#20324b" stroke-width="1"/>
  <text x="58" y="70" fill="#f8fbff" font-family="Inter,Segoe UI,sans-serif" font-size="34" font-weight="800">2024 NFL model comparison</text>
  <text x="58" y="102" fill="#9fb4d1" font-family="Inter,Segoe UI,sans-serif" font-size="16">Historical analytics only. Accuracy higher is better; Brier lower is better.</text>
  <g font-family="Inter,Segoe UI,sans-serif" font-size="16" font-weight="700">
    <text x="58" y="166" fill="#d8e6f7">Elo</text>
    <rect x="238" y="140" width="445" height="34" rx="10" fill="url(#bar)" opacity="0.72"/>
    <text x="702" y="164" fill="#f8fbff">68.4%</text>
    <text x="790" y="164" fill="#f1bd5c">0.2088</text>
    <text x="58" y="246" fill="#d8e6f7">XGBoost</text>
    <rect x="238" y="220" width="452" height="34" rx="10" fill="url(#bar)" opacity="0.86"/>
    <text x="702" y="244" fill="#f8fbff">69.5%</text>
    <text x="790" y="244" fill="#f1bd5c">0.2013</text>
    <text x="58" y="326" fill="#d8e6f7">Logistic Regression</text>
    <rect x="238" y="300" width="456" height="34" rx="10" fill="url(#bar)" filter="url(#glow)"/>
    <text x="702" y="324" fill="#f8fbff">70.2%</text>
    <text x="790" y="324" fill="#f1bd5c">0.2010</text>
    <text x="58" y="406" fill="#d8e6f7">Ensemble</text>
    <rect x="238" y="380" width="454" height="34" rx="10" fill="url(#bar)" opacity="0.94"/>
    <text x="702" y="404" fill="#f8fbff">69.8%</text>
    <text x="790" y="404" fill="#8de8b4">0.1986</text>
  </g>
  <g font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="800">
    <text x="238" y="512" fill="#58dce6">Accuracy</text>
    <text x="790" y="512" fill="#f1bd5c">Brier score</text>
  </g>
</svg>
